<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prensner Lab - Project Tracking</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.FUNCTIONS_BASE =
        window.FUNCTIONS_BASE || "http://127.0.0.1:54321/functions/v1";
      window.SUPABASE_URL =
        window.SUPABASE_URL || "http://127.0.0.1:54321";
      window.SUPABASE_PUBLISHABLE_KEY =
        window.SUPABASE_PUBLISHABLE_KEY ||
        "sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH";
    </script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>

    <nav>
        <section class="auth-panel">
            <h3>Account</h3>
            <form id="auth-form">
                <label for="auth-email">Email</label>
                <input id="auth-email" name="email" type="email" required />
                <label for="auth-password">Password</label>
                <input id="auth-password" name="password" type="password" required />
                <button type="submit">Sign in</button>
            </form>
            <button id="logout-btn" type="button" class="secondary" hidden>Sign out</button>
            <p id="auth-status">Sign in with your invited account.</p>
        </section>
        <h2>Projects</h2>
        <ul
          id="project-nav"
          data-hx-get="/list-projects"
          data-hx-trigger="refresh-projects from:body"
          data-hx-swap="innerHTML"
        >
          <li>Sign in to load projects.</li>
        </ul>
    </nav>

    <main id="main-content">
        <div class="container">
            <h1>Sample Tracking</h1>
            <p>Select a project in the left nav to view its samples and latest status.</p>
        </div>
    </main>

    <div id="status-modal" class="modal" hidden>
      <div class="modal-backdrop" data-modal-close></div>
      <div id="modal-content" class="modal-content"></div>
    </div>

</body>
</html>
