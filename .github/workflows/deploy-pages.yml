name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
      FUNCTIONS_BASE: ${{ vars.FUNCTIONS_BASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runtime config
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "::warning::SUPABASE_URL or SUPABASE_PUBLISHABLE_KEY repo variable is not set; deploying with default config.js"
          else
            if [ -z "$FUNCTIONS_BASE" ]; then
              FUNCTIONS_BASE="${SUPABASE_URL%/}/functions/v1"
            fi

            cat > frontend/config.js <<EOF
window.FUNCTIONS_BASE = "${FUNCTIONS_BASE}";
window.SUPABASE_URL = "${SUPABASE_URL}";
window.SUPABASE_PUBLISHABLE_KEY = "${SUPABASE_PUBLISHABLE_KEY}";
EOF
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
